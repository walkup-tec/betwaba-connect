[variables]
NODE_ENV = "production"
HOST = "0.0.0.0"
NITRO_HOST = "0.0.0.0"
PORT = "3000"
NITRO_PORT = "3000"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = ["bun run build"]

[start]
cmd = "node .output/server/index.mjs"
